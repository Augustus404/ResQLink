<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQLink - Register</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="popup" id="popup"></div>

<div class="container">

<script type="module" src="app.js"></script>
